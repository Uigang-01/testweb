<!DOCTYPE html>
<html>
    <head> 
        <title>패턴4</title> 
        <meta name="viewport" content="user-scalable=no,initialscale=1,maximum-scale=1"> 
        <style> 
            * { 
                margin: 0; 
                padding: 0;
            } 
            body { 
                width: 960px; 
                margin: 0 auto; 
                overflow: hidden; 
            } 
            #menu { 
                width: 260px;
                float: right; 
            }
            #section { 
                width: 700px; 
                float: left; 
            }

            li { list-style: none; } 

            @media screen and (max-width: 767px) { 
                /* 스마트폰 사이즈에서는 전부 해제합니다. */ 
                body { width: auto } 
                #menu { width: auto; float: none; } 
                #section { width: auto; float: none; } 
            } 
        </style>
    </head>
    <body> 
        <div id="section"> 
            <h1>서시</h1> 
            <h3>윤동주</h3>
            <p>죽는 날까지 하늘을 우러러</p>
            <p>한 점 부끄럼이 없기를,</p>
            <p>잎새에 이는 바람에도</p>
            <p>나는 괴로워했다.</p>
            <p>별을 노래하는 마음으로</p>
            <p>모든 죽어가는 것을 사랑해야지</p>
            <p>그리고 나한테 주어진 길을</p>
            <p>걸어가야겠다.</p>
            <br>
            <p>오늘 밤에도 별이 바람에 스치운다.</p>
        </div>  
    </body> 
</html>
