<!DOCTYPE html>
<html lang="ko">
<head> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>서시 (Seoshi)</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0;
        } 
        body { 
            line-height: 1.8;
            color: white;
        } 
        #section { 
                background-color: #000080;
                width: 960px; 
                margin: 0 auto;
                padding: 40px 30px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            }
        @media screen and (min-width: 769px) { 
            #section h1, #section p {
                text-align: center;
                margin-bottom: 20px;
            }

            #section h3 {
                text-align: right;
                margin-bottom: 20px;
                padding-right: 300px;
            }
        }

        h1 {
            font-size: 3em;
            margin-top: 0;
        }

        h3 {
             font-size: 1.5em;
        }

        p {
            margin-bottom: 15px; 
            padding: 5px 0;
        }



        @media screen and (max-width: 768px) { 
            #section { 
                width: auto; 
                padding: 20px 15px;
                margin: 0;
            }
            #section h1, #section p {
                text-align: center;
                margin-bottom: 20px;
            }

            #section h3 {
                text-align: right;
                margin-bottom: 20px;
                padding-right: 100px;
            }
            h1 {
                font-size: 2em;
            }

            h3 {
                font-size: 1.2em;
            }
        } 

    </style>
</head>
<body> 
    <div id="section"> 
        <h1>서시</h1> 
        <h3>윤동주</h3>
        
        <p>죽는 날까지 하늘을 우러러</p>
        <p>한 점 부끄럼이 없기를,</p>
        <p>잎새에 이는 바람에도</p>
        <p>나는 괴로워했다.</p>
        <br> 
        <p>별을 노래하는 마음으로</p>
        <p>모든 죽어가는 것을 사랑해야지</p>
        <p>그리고 나한테 주어진 길을</p>
        <p>걸어가야겠다.</p>
        <br>
        <p>오늘 밤에도 별이 바람에 스치운다.</p>
    </div> 
</body> 
</html>
